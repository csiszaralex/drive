name: Release & Deploy

on:
  push:
    tags:
      - 'backend@*'
      - 'frontend@*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      service: ${{ steps.meta.outputs.service }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract Metadata from Tag
        id: meta
        run: |
          TAG=${{ github.ref_name }}
          SERVICE=${TAG%@*}
          VERSION=${TAG#*@}

          echo "Detected Service: $SERVICE"
          echo "Detected Version: $VERSION"

          # Outputba rakjuk, hogy későbbi lépések/jobok lássák
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Repo név kisbetűsítése
          REPO="${{ github.repository }}"
          echo "IMAGE_NAME=${REPO,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        if: steps.meta.outputs.service == 'backend'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache,mode=max

      - name: Build and push Frontend
        if: steps.meta.outputs.service == 'frontend'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          build-args: |
            VITE_APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to VPS
        env:
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'postgres' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'mydb' }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          echo "Deploying ${{ needs.build-and-push.outputs.service }} version ${{ needs.build-and-push.outputs.version }}..."

          REPO="${{ github.repository }}"
          IMAGE_NAME="${REPO,,}"

          cat <<EOF > .env
          ADMIN_PASS=$ADMIN_PASS
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_DB=$POSTGRES_DB
          IMAGE_NAME=$IMAGE_NAME
          EOF

          docker compose pull ${{ needs.build-and-push.outputs.service }}

          if [ "${{ needs.build-and-push.outputs.service }}" == "backend" ]; then
            echo "Starting database explicitly..."
            docker compose up -d db

            sleep 3

            echo "Running database migrations..."
            docker compose run --rm backend pnpm dlx prisma migrate deploy --schema=apps/backend/prisma/schema.prisma
          fi

          docker compose up -d --remove-orphans ${{ needs.build-and-push.outputs.service }} db
          docker image prune -f
          rm .env
